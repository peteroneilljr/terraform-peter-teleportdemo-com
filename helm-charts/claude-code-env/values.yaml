teleport:
  proxyAddr: ""                    # Required: e.g. peter.teleportdemo.com:443
  version: "18.7.6"
  botTokenName: "claude-code-bot"   # Token for tbot (Bot role)
  nodeTokenName: "claude-code-node" # Token for SSH node (Node role)
  nodeName: ""                      # Auto-generated if empty: claude-code-<release>

image:
  repository: ""                   # Required: registry/claude-code-env
  tag: "latest"
  pullPolicy: IfNotPresent

anthropicApiKey:
  secretName: ""                   # Required: K8s secret name
  secretKey: "api-key"

git:
  repository: ""                   # Git repo URL to clone
  branch: "main"
  sshKeySecret:
    name: ""
    key: "ssh-privatekey"

mcpServers: {}
# Example:
#   teleport:
#     command: tsh
#     args: ["--proxy=peter.teleportdemo.com:443", "-i", "/opt/machine-id/identity", "mcp", "connect", "teleport-mcp"]
#   github:
#     command: npx
#     args: ["-y", "@modelcontextprotocol/server-github"]
#     env:
#       GITHUB_PERSONAL_ACCESS_TOKEN:
#         secretKeyRef:
#           name: github-pat
#           key: token

claude:
  model: ""                        # Optional model override
  extraSettings: {}                # Merged into settings.json

resources:
  claude:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "4"
      memory: "8Gi"
  tbot:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      memory: "256Mi"
  agent:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      memory: "512Mi"

serviceAccount:
  annotations: {}
