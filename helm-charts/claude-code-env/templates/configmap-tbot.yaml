apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "claude-code-env.fullname" . }}-tbot
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claude-code-env.labels" . | nindent 4 }}
data:
  tbot.yaml: |
    version: v2
    proxy_server: {{ .Values.teleport.proxyAddr }}
    onboarding:
      join_method: kubernetes
      token: {{ .Values.teleport.botTokenName }}
    storage:
      type: memory
    services:
      - type: identity
        destination:
          type: directory
          path: /opt/machine-id
