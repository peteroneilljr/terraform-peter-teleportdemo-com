apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "claude-code-env.fullname" . }}-agent
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claude-code-env.labels" . | nindent 4 }}
data:
  teleport.yaml: |
    version: v3
    teleport:
      proxy_server: {{ .Values.teleport.proxyAddr }}
      join_params:
        method: kubernetes
        token_name: {{ .Values.teleport.nodeTokenName }}
    ssh_service:
      enabled: true
      labels:
        env: claude-code
        instance: {{ .Release.Name }}
    auth_service:
      enabled: false
    proxy_service:
      enabled: false
