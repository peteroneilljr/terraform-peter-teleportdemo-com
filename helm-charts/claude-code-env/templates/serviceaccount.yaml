apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "claude-code-env.fullname" . }}-tbot
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claude-code-env.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
